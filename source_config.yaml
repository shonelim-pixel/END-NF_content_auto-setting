# ============================================================
# END NF 자동 콘텐츠 생산 시스템 v2 - 소스 설정
# ============================================================
# 콘텐츠 타입별 소스 정의 (story / info / welfare)

# ── 1회차(화요일): 💛 우리의 이야기 ──
story_sources:
  description: "환자/가족 이야기, 응원 메시지, 힐링 콘텐츠"
  sources:
    - name: "CTF Stories of NF"
      type: "web_scrape"
      url: "https://www.ctf.org/storiesofnf/"
      selectors:
        story_list: ".story-card, .post-card, article"
      frequency: "daily"

    - name: "Reddit r/neurofibromatosis"
      type: "reddit_api"
      subreddit: "neurofibromatosis"
      sort: "top"
      time_filter: "week"
      filter_keywords:
        positive:
          - "hope"
          - "success"
          - "grateful"
          - "milestone"
          - "achievement"
          - "positive"
          - "happy"
          - "love"
          - "support"
          - "strength"
          - "diagnosis"
          - "journey"
          - "family"
          - "child"
          - "parent"
          - "school"
          - "first time"
        negative:
          - "suicide"
          - "hopeless"
          - "give up"
      max_results: 10

    - name: "NF Network Patient Stories"
      type: "web_scrape"
      url: "https://www.nfnetwork.org/understanding-nf/personal-stories/"
      frequency: "weekly"

    - name: "Instagram #neurofibromatosis (참고용)"
      type: "manual_reference"
      hashtags:
        - "#neurofibromatosis"
        - "#nfwarrior"
        - "#nfawareness"
        - "#endnf"
        - "#nf1"
        - "#invisibleillness"
      note: "Instagram API 접근 제한 - 수동 참고"

    - name: "YouTube NF Patient Vlogs"
      type: "manual_reference"
      channels:
        - "NF Network"
        - "Children's Tumor Foundation"
      search_terms:
        - "neurofibromatosis daily life"
        - "NF patient story vlog"
        - "living with NF"

# ── 2회차(금요일): 💡 알아두면 좋은 소식 ──
# 주차별 로테이션: 1주차(NF연구) → 2주차(유전질환) → 3주차(CTF글로벌) → 4주차(크로스오버)

info_week1_sources:
  description: "NF 관련 최신 국제 논문/연구"
  sources:
    - name: "PubMed - NF Research"
      type: "api"
      base_url: "https://eutils.ncbi.nlm.nih.gov/entrez/eutils/"
      search_terms:
        - "neurofibromatosis"
        - "neurofibromatosis type 1"
        - "neurofibromatosis type 2"
        - "NF1 gene therapy"
        - "schwannomatosis"
        - "plexiform neurofibroma treatment"
        - "selumetinib neurofibromatosis"
        - "MEK inhibitor NF1"
      max_results: 10
      sort: "date"
      days_back: 14

    - name: "PubMed Central (PMC)"
      type: "api"
      base_url: "https://eutils.ncbi.nlm.nih.gov/entrez/eutils/"
      database: "pmc"
      search_terms:
        - "neurofibromatosis"
      max_results: 5
      days_back: 14

    - name: "ClinicalTrials.gov - NF"
      type: "api"
      base_url: "https://clinicaltrials.gov/api/v2/studies"
      search_terms:
        - "neurofibromatosis"
        - "NF1 plexiform"
        - "selumetinib"
        - "MEK inhibitor NF"
      filters:
        status:
          - "RECRUITING"
          - "NOT_YET_RECRUITING"
          - "ACTIVE_NOT_RECRUITING"
      max_results: 20
      sort: "LastUpdatePostDate"

    - name: "Google News - NF Treatment"
      type: "rss"
      urls:
        - "https://news.google.com/rss/search?q=neurofibromatosis+treatment+drug&hl=en&gl=US&ceid=US:en"
        - "https://news.google.com/rss/search?q=selumetinib+koselugo&hl=en&gl=US&ceid=US:en"
        - "https://news.google.com/rss/search?q=NF1+clinical+trial&hl=en&gl=US&ceid=US:en"
      max_results: 10

info_week2_sources:
  description: "유전질환 일반 연구/뉴스 (NF 넘어 확장)"
  sources:
    - name: "PubMed - Genetic Disease"
      type: "api"
      base_url: "https://eutils.ncbi.nlm.nih.gov/entrez/eutils/"
      search_terms:
        - "rare genetic disease treatment"
        - "gene therapy clinical trial"
        - "CRISPR rare disease"
        - "precision medicine genetics"
        - "RASopathy treatment"
        - "inherited disorder therapy"
        - "orphan drug development"
      max_results: 10
      sort: "date"
      days_back: 14

    - name: "Google News - Gene Therapy"
      type: "rss"
      urls:
        - "https://news.google.com/rss/search?q=gene+therapy+rare+disease&hl=en&gl=US&ceid=US:en"
        - "https://news.google.com/rss/search?q=CRISPR+genetic+disease+treatment&hl=en&gl=US&ceid=US:en"
        - "https://news.google.com/rss/search?q=orphan+drug+approval&hl=en&gl=US&ceid=US:en"
      max_results: 10

    - name: "Google News - 유전질환 (한국)"
      type: "rss"
      urls:
        - "https://news.google.com/rss/search?q=%EC%9C%A0%EC%A0%84%EC%A7%88%ED%99%98+%EC%B9%98%EB%A3%8C&hl=ko&gl=KR&ceid=KR:ko"
        - "https://news.google.com/rss/search?q=%EC%9C%A0%EC%A0%84%EC%9E%90+%EC%B9%98%EB%A3%8C+%EC%8B%A0%EC%95%BD&hl=ko&gl=KR&ceid=KR:ko"
      max_results: 10

info_week3_sources:
  description: "CTF/해외 NF 커뮤니티 글로벌 소식"
  sources:
    - name: "CTF News"
      type: "web_scrape"
      url: "https://www.ctf.org/news/"
      frequency: "daily"

    - name: "CTF Events"
      type: "web_scrape"
      url: "https://www.ctf.org/events/"
      frequency: "weekly"

    - name: "CTF Clinical Drug Pipeline"
      type: "web_scrape"
      url: "https://www.ctf.org/clinical-drug-pipeline/"
      frequency: "weekly"

    - name: "NF Network (Europe)"
      type: "web_scrape"
      url: "https://www.nfnetwork.org/"
      frequency: "weekly"

    - name: "Neurofibromatosis Society UK"
      type: "web_scrape"
      url: "https://www.nfsociety.co.uk/"
      note: "영국 NF 커뮤니티 소식"
      frequency: "weekly"

    - name: "Shine a Light NF"
      type: "web_scrape"
      url: "https://www.shinealightnf.org/"
      frequency: "weekly"

    - name: "Google News - NF Community"
      type: "rss"
      urls:
        - "https://news.google.com/rss/search?q=neurofibromatosis+community&hl=en&gl=US&ceid=US:en"
        - "https://news.google.com/rss/search?q=NF+foundation+awareness&hl=en&gl=US&ceid=US:en"
      max_results: 10

info_week4_sources:
  description: "크로스오버 - NF×일반의학, NF×기술, NF×정책 등"
  sources:
    - name: "PubMed - NF Crossover"
      type: "api"
      base_url: "https://eutils.ncbi.nlm.nih.gov/entrez/eutils/"
      search_terms:
        - "neurofibromatosis quality of life"
        - "NF1 cognitive"
        - "NF1 learning disability"
        - "neurofibromatosis AI diagnosis"
        - "RAS pathway targeted therapy"
        - "neurofibroma imaging"
      max_results: 10
      sort: "date"
      days_back: 30

    - name: "Google News - 희귀질환 정책"
      type: "rss"
      urls:
        - "https://news.google.com/rss/search?q=%ED%9D%AC%EA%B7%80%EC%A7%88%ED%99%98+%EC%A0%95%EC%B1%85&hl=ko&gl=KR&ceid=KR:ko"
        - "https://news.google.com/rss/search?q=%EC%8B%A0%EA%B2%BD%EC%84%AC%EC%9C%A0%EC%A2%85&hl=ko&gl=KR&ceid=KR:ko"
        - "https://news.google.com/rss/search?q=%ED%9D%AC%EA%B7%80%EC%A7%88%ED%99%98+%EA%B1%B4%EA%B0%95%EB%B3%B4%ED%97%98&hl=ko&gl=KR&ceid=KR:ko"
      max_results: 10

    - name: "NORD (US Rare Disease Policy)"
      type: "rss"
      urls:
        - "https://rarediseases.org/feed/"
      max_results: 5

# ── 특별편: 📋 복지 가이드 시리즈 ──
welfare_sources:
  description: "복지/제도 정보 소스 (월 1~2회)"
  sources:
    - name: "보건복지부 정책 뉴스"
      type: "web_scrape"
      url: "https://www.mohw.go.kr/board.es?mid=a10503000000&bid=0027"
      filter_keywords:
        - "희귀질환"
        - "희귀난치"
        - "유전자"
        - "건강보험"
        - "의료비"
        - "장애"
      frequency: "weekly"

    - name: "한국희귀질환재단"
      type: "web_scrape"
      url: "https://www.krdf.org/"
      frequency: "weekly"

    - name: "건강보험심사평가원"
      type: "web_scrape"
      url: "https://www.hira.or.kr/bbsDummy.do?pgmid=HIRAA020041000000"
      filter_keywords:
        - "희귀"
        - "유전"
        - "신약"
        - "산정특례"
      frequency: "weekly"

    - name: "국민건강보험공단"
      type: "web_scrape"
      url: "https://www.nhis.or.kr/"
      filter_keywords:
        - "산정특례"
        - "본인부담"
        - "희귀"
      frequency: "monthly"

    - name: "한국장애인개발원"
      type: "web_scrape"
      url: "https://www.koddi.or.kr/"
      filter_keywords:
        - "장애등급"
        - "장애등록"
        - "활동지원"
      frequency: "monthly"

# ── 비정기 특집: 이범희 교수님 / 한국 NF 연구 ──
special_professor_lee:
  trigger: "환자 관련 이야기가 부족할 때"
  sources:
    - name: "PubMed - 이범희 교수"
      type: "api"
      base_url: "https://eutils.ncbi.nlm.nih.gov/entrez/eutils/"
      search_terms:
        - "Lee Beom Hee[Author] neurofibromatosis"
        - "Lee BH[Author] Seoul National University genetics"
        - "Lee Beom Hee[Author] rare disease"
        - "Lee BH[Author] pediatric genetics Korea"
      max_results: 10

    - name: "KoreaMed - 한국 NF 논문"
      type: "web_scrape"
      url: "https://koreamed.org/"
      search_terms:
        - "neurofibromatosis Korea"
        - "이범희 유전"
      frequency: "weekly"

# ── ⭐ 핵심 참고처 (모든 타입 공통) ──
primary_references:
  - name: "레어노트 (RareNote)"
    type: "web_scrape"
    urls:
      main: "https://rarenote.io/"
      news: "https://rarenote.io/news"
      contents: "https://rarenote.io/contents"
    description: |
      휴먼스케이프 운영 국내 최대 희귀질환 정보 플랫폼.
      글로벌 뉴스 한글 번역, 임상시험 현황, 질환 정보,
      환자 모임, 복지/정책 정보, 뉴스레터(Letter R) 제공.
    use_cases:
      - "story: 환자 모임/커뮤니티 소식"
      - "info: 글로벌 연구 뉴스 한글 참고, 임상시험 크로스체크"
      - "welfare: 복지/정책 정보, 산정특례 등"
      - "전체: 콘텐츠 톤앤매너 참고 (환자 눈높이 쉬운 설명)"
    frequency: "daily"

  - name: "CTF (Children's Tumor Foundation)"
    type: "web_scrape"
    urls:
      main: "https://www.ctf.org/"
      news: "https://www.ctf.org/news/"
      stories: "https://www.ctf.org/storiesofnf/"
      pipeline: "https://www.ctf.org/clinical-drug-pipeline/"
      research: "https://www.ctf.org/researchportfolio/"
      resources: "https://www.ctf.org/resource-library/"
      events: "https://www.ctf.org/events/"
    description: |
      세계 최대 NF 전문 비영리 재단. NF 연구의 최대 민간 펀더.
      환자 스토리, 최신 뉴스, 임상시험 파이프라인, 연구 포트폴리오,
      교육 자료, NF Summit 등 이벤트 정보 제공.
    use_cases:
      - "story: Stories of NF 환자 이야기"
      - "info week1: 최신 연구 동향 및 CTF 연구 포트폴리오"
      - "info week3: CTF 뉴스 및 이벤트, Clinical Drug Pipeline"
      - "welfare: 환자 자원 및 교육 자료"
    frequency: "daily"

# ── 전역 설정 ──
global_settings:
  content_language: "ko"
  timezone: "Asia/Seoul"
  schedule:
    # v2: 주 2회 (화요일 + 금요일)
    story_day: "tuesday"      # 1회차: 💛 우리의 이야기
    info_day: "friday"        # 2회차: 💡 알아두면 좋은 소식
    welfare_frequency: "monthly_1_2"  # 특별편: 월 1~2회
    generation_time: "06:00"  # KST
    review_deadline: "09:00"  # KST
  notification:
    channel: "telegram"
    backup_channel: "email"
  image_prompt:
    style: "warm, hopeful, medical illustration, soft colors, supportive"
    negative_prompt: "scary, dark, sad, depressing, gore, blood"
  archive:
    location: "github_repo"
    retention_days: 365
  anti_repetition:
    cooldown_days: 60
    backlog_max: 20
    evergreen_count: 10
    education_series_count: 8
